<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المهندس 2026 | E2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Cairo',sans-serif;
        }
        body{
            background:#0f172a;
            color:white;
            overflow-x:hidden;
            min-height:100vh;
        }
        .glass{
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.08);
        }
        .main-gradient{
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 35%, #4f46e5 100%);
        }
        .input-dark{
            width:100%;
            padding:16px;
            background:#1e293b;
            border:1px solid #334155;
            border-radius:16px;
            color:white;
            outline:none;
            font-weight:700;
            transition:.3s;
        }
        .input-dark:focus{
            border-color:#6366f1;
            box-shadow:0 0 0 4px rgba(99,102,241,.15);
        }
        .btn-primary{
            width:100%;
            padding:16px;
            background:#4f46e5;
            border:none;
            border-radius:16px;
            color:white;
            font-weight:900;
            cursor:pointer;
            transition:.3s;
        }
        .btn-primary:hover{
            background:#4338ca;
            transform:translateY(-2px);
        }
        .card-dark{
            background:#111827;
            border:1px solid #1f2937;
            border-radius:22px;
        }
        .logo-box{
            width:90px;
            height:90px;
            border-radius:30px;
            background:linear-gradient(135deg, #4f46e5, #7c3aed);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:38px;
            font-weight:900;
            box-shadow: 0 20px 40px rgba(79,70,229,.4);
        }
        ::-webkit-scrollbar{
            width:8px;
        }
        ::-webkit-scrollbar-thumb{
            background:#4f46e5;
            border-radius:20px;
        }
        #toast{
            position:fixed;
            bottom:30px;
            left:50%;
            transform:translateX(-50%);
            background:#4f46e5;
            padding:14px 30px;
            border-radius:30px;
            font-weight:800;
            z-index:99999;
            opacity:0;
            transition:.3s;
            pointer-events: none;
        }
        #toast.show{
            opacity:1;
        }
    </style>
</head>
<body>

    <div id="toast">تمت العملية بنجاح</div>

    <section id="loginPage" class="fixed inset-0 flex items-center justify-center p-5 main-gradient z-50">
        <div class="glass rounded-[40px] p-8 w-full max-w-md text-center">
            <div class="logo-box mx-auto mb-6">E</div>
            <h1 class="text-3xl font-black mb-2">نظام المهندس 2026</h1>
            <p class="text-indigo-200 text-sm mb-8">Developed By E2</p>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="اسم المستخدم" class="input-dark">
                <input id="password" type="password" placeholder="كلمة المرور" class="input-dark">
                <button onclick="handleLogin()" class="btn-primary">تسجيل الدخول</button>
            </div>
        </div>
    </section>

    <section id="loader" class="fixed inset-0 bg-slate-950 flex items-center justify-center hidden z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-20 w-20 border-b-4 border-indigo-500 mx-auto mb-5"></div>
            <p class="font-bold">جاري تحميل البيانات...</p>
        </div>
    </section>

    <div id="app" class="hidden min-h-screen pb-24">
        <header class="sticky top-0 z-40 bg-slate-900/90 backdrop-blur-lg border-b border-slate-800">
            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center font-black text-xl">E</div>
                    <div>
                        <h2 class="font-black">نظام المهندس</h2>
                        <p id="loggedUser" class="text-xs text-slate-400">...</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="internetIndicator" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)] transition-all duration-300" title="حالة الاتصال"></div>
                    <button onclick="syncCustomers()" class="w-11 h-11 rounded-xl bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main id="mainContainer"></main>
    </div>

    <script>
        /* FIREBASE CONFIGURATION */
        const firebaseConfig = {
            apiKey: "AIzaSyBhNZQ-VyLcwqJSwF2pTDMa5ItAd5muO1s",
            authDomain: "tailorsystem-9d160.firebaseapp.com",
            databaseURL: "https://tailorsystem-9d160-default-rtdb.firebaseio.com",
            projectId: "tailorsystem-9d160"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        /* GLOBAL VARIABLES */
        let currentUser = "";
        let isAdmin = false;
        let localData = [];
        let currentEditingName = "";

        const USERS = {
            ehab: "e171999",
            enal: "e011",
            sossana: "s972000",
            marleen: "m1810"
        };

        // تحديث الألقاب والمسميات بناءً على طلبك يا هندسة
        const USER_NAMES = {
            ehab: "🤵 المطور إيهاب",
            enal: "👨‍💼 المهندس إينال",
            sossana: "🌙 القمر سوسو",
            marleen: "👩‍🏫 الميس ميرو"
        };

        function showToast(message){
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        function handleLogin(){
            const user = document.getElementById("username").value.trim().toLowerCase();
            const pass = document.getElementById("password").value.trim();

            if(USERS[user] === pass){
                currentUser = USER_NAMES[user];
                isAdmin = (user === "ehab" || user === "enal");
                
                document.getElementById("loginPage").classList.add("hidden");
                document.getElementById("app").classList.remove("hidden");
                document.getElementById("loggedUser").innerText = currentUser;
                
                showToast("تم تسجيل الدخول");
                syncCustomers();
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }

        lucide.createIcons();

        /* ===========================
           MAIN PAGE BUILDER
        =========================== */
        function buildMainPage(){
            document.getElementById("mainContainer").innerHTML = `
                <div class="max-w-6xl mx-auto p-4">
                    <div class="mb-6">
                        <div class="relative">
                            <input id="searchInput" type="text" placeholder="ابحث باسم العميل أو رقم الهاتف..." class="input-dark pl-12" oninput="searchCustomers(this.value)">
                        </div>
                    </div>
                    <div id="customerCounter" class="mb-4 text-slate-400 text-sm font-bold">عدد العملاء: 0</div>
                    <div id="customerList" class="grid gap-4"></div>
                </div>
            `;
            lucide.createIcons();
        }

        /* ===========================
           REALTIME FIREBASE SYNC
        =========================== */
        function syncCustomers(){
            document.getElementById("loader").classList.remove("hidden");
            
            db.ref("customers").on("value", (snapshot) => {
                const data = snapshot.val() || {};
                
                localData = Object.values(data).filter(item => item && item.name);
                localData.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
                
                saveCache();
                
                if(document.getElementById("searchInput")) {
                    searchCustomers(document.getElementById("searchInput").value);
                } else {
                    buildMainPage();
                    renderCustomers(localData);
                }
                
                document.getElementById("loader").classList.add("hidden");
            });
        }

        /* ===========================
           CUSTOMER LIST RENDER
        =========================== */
        function renderCustomers(customers){
            const list = document.getElementById("customerList");
            const counter = document.getElementById("customerCounter");
            
            if(!list || !counter) return;
            
            counter.innerText = `عدد العملاء : ${customers.length}`;
            
            if(customers.length === 0){
                list.innerHTML = `
                    <div class="card-dark p-12 text-center">
                        <i data-lucide="users" class="w-16 h-16 mx-auto mb-4 text-slate-600"></i>
                        <h3 class="font-black text-lg">لا يوجد عملاء حالياً</h3>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            list.innerHTML = "";
            customers.forEach(customer => {
                const card = document.createElement("div");
                card.className = "card-dark p-5 cursor-pointer hover:border-indigo-500 transition";
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center font-black text-xl">
                                ${customer.name.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-black text-lg">${customer.name}</h3>
                                <p class="text-slate-400 text-sm">${customer.phone || "بدون هاتف"}</p>
                            </div>
                        </div>
                        <div><i data-lucide="chevron-left" class="text-slate-500"></i></div>
                    </div>
                `;
                card.onclick = () => { showCustomerDetails(customer); };
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        /* ===========================
           SEARCH
        =========================== */
        function searchCustomers(keyword){
            const value = keyword.trim().toLowerCase();
            if(!value){
                renderCustomers(localData);
                return;
            }
            const result = localData.filter(customer => {
                const name = (customer.name || "").toLowerCase();
                const phone = (customer.phone || "").toString();
                return (name.includes(value) || phone.includes(value));
            });
            renderCustomers(result);
        }

        /* ===========================
           VIEW COUNTER
        =========================== */
        async function increaseViewCount(customer){
            const current = (customer.viewCount || 0);
            await db.ref("customers/" + customer.name).update({
                viewCount: current + 1
            });
        }

        /* ===========================
           CUSTOMER DETAILS MODAL
        =========================== */
        document.body.insertAdjacentHTML("beforeend", `
            <div id="detailsModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div class="card-dark w-full max-w-2xl p-6 relative max-h-[90vh] overflow-y-auto">
                    <button onclick="closeDetails()" class="absolute left-4 top-4 w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center font-bold z-10">✕</button>
                    <div id="detailsContent" class="mt-6"></div>
                </div>
            </div>
        `);

        function showCustomerDetails(customer){
            increaseViewCount(customer);
            showToast("تم فتح بيانات العميل");
            
            const content = document.getElementById("detailsContent");
            content.innerHTML = `
                <div id="captureArea" class="bg-[#111827] p-4 rounded-2xl">
                    <div id="photoHeader" class="flex justify-between items-center mb-6 pb-4 border-b border-slate-800">
                        <div>
                            <h2 class="text-3xl font-black text-white mb-1">${customer.name}</h2>
                            <p class="text-indigo-400 text-sm font-bold">كارت المقاسات الذكي</p>
                        </div>
                        <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center font-black text-xl text-white shadow-lg">E</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        ${createField("الهاتف", customer.phone)}
                        ${createField("العنوان", customer.country)}
                        ${createField("الطول", customer.length)}
                        ${createField("الكم", customer.sleeve)}
                        ${createField("السدر", customer.seder)}
                        ${createField("القبة", customer.qubba)}
                        ${createField("الديل", customer.tail)}
                        ${createField("اللياقة", customer.collar)}
                        ${createField("السفرة", customer.sufra)}
                    </div>
                    <div class="mt-4">${createField("ملاحظات", customer.notes)}</div>
                </div>

                <div id="actionButtons" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-8">
                    <a href="tel:${customer.phone || ''}" class="bg-green-600 p-3 rounded-xl text-center font-black text-white hover:bg-green-700 transition">اتصال</a>
                    <button onclick="openEditForm('${customer.name}')" class="bg-blue-600 p-3 rounded-xl font-black text-white hover:bg-blue-700 transition">تعديل</button>
                    <button onclick="handleDeleteCustomer('${customer.name}')" class="bg-red-600 p-3 rounded-xl font-black text-white hover:bg-red-700 transition">حذف</button>
                    <button onclick="saveCardImage('${customer.name}')" class="bg-indigo-600 p-3 rounded-xl font-black text-white hover:bg-indigo-700 transition">صورة</button>
                </div>
            `;
            document.getElementById("detailsModal").classList.remove("hidden");
        }

        function createField(title, value){
            if(!value) return "";
            return `
                <div class="bg-slate-800 p-4 rounded-2xl">
                    <p class="text-xs text-slate-400 mb-1">${title}</p>
                    <p class="font-black text-white">${value}</p>
                </div>
            `;
        }

        function closeDetails(){
            document.getElementById("detailsModal").classList.add("hidden");
        }

        /* ===========================
           ADD / EDIT FORMS
        =========================== */
        function openAddForm(){
            document.getElementById("detailsContent").innerHTML = `
                <h2 class="text-2xl font-black mb-6">إضافة عميل جديد</h2>
                <form onsubmit="saveCustomer(event)">
                    <div class="grid gap-4 max-h-[60vh] overflow-y-auto p-1">
                        <input id="f_name" class="input-dark" placeholder="اسم العميل" required>
                        <input id="f_phone" class="input-dark" placeholder="رقم الهاتف">
                        <input id="f_country" class="input-dark" placeholder="العنوان">
                        <input id="f_length" class="input-dark" placeholder="الطول">
                        <input id="f_sleeve" class="input-dark" placeholder="الكم">
                        <input id="f_seder" class="input-dark" placeholder="السدر">
                        <input id="f_qubba" class="input-dark" placeholder="القبة">
                        <input id="f_tail" class="input-dark" placeholder="الديل">
                        <input id="f_collar" class="input-dark" placeholder="اللياقة">
                        <input id="f_sufra" class="input-dark" placeholder="السفرة">
                        <textarea id="f_notes" class="input-dark" placeholder="ملاحظات"></textarea>
                        <button class="btn-primary mt-2">حفظ العميل</button>
                    </div>
                </form>
            `;
            document.getElementById("detailsModal").classList.remove("hidden");
        }

        async function saveCustomer(e){
            e.preventDefault();
            const name = document.getElementById("f_name").value.trim();
            if(!name) { alert("اسم العميل مطلوب"); return; }

            const exists = localData.find(c => c.name.toLowerCase() === name.toLowerCase());
            if(exists){ alert("يوجد عميل بنفس الاسم"); return; }

            const customer = {
                name: name,
                phone: document.getElementById("f_phone").value,
                country: document.getElementById("f_country").value,
                length: document.getElementById("f_length").value,
                sleeve: document.getElementById("f_sleeve").value,
                seder: document.getElementById("f_seder").value,
                qubba: document.getElementById("f_qubba").value,
                tail: document.getElementById("f_tail").value,
                collar: document.getElementById("f_collar").value,
                sufra: document.getElementById("f_sufra").value,
                notes: document.getElementById("f_notes").value,
                viewCount: 0,
                createdBy: currentUser,
                createdAt: new Date().toLocaleString("ar-EG"),
                updatedAt: new Date().toLocaleString("ar-EG")
            };

            await db.ref("customers/" + name).set(customer);
            showToast("تم الحفظ بنجاح");
            closeDetails();
        }

        function openEditForm(name){
            const customer = localData.find(c => c.name === name);
            if(!customer) return;
            
            currentEditingName = name;
            document.getElementById("detailsContent").innerHTML = `
                <h2 class="text-2xl font-black mb-6">تعديل بيانات العميل</h2>
                <form onsubmit="handleUpdateCustomer(event)">
                    <div class="grid gap-4 max-h-[60vh] overflow-y-auto p-1">
                        <input id="e_name" class="input-dark" value="${customer.name}" required>
                        <input id="e_phone" class="input-dark" value="${customer.phone || ''}" placeholder="رقم الهاتف">
                        <input id="e_country" class="input-dark" value="${customer.country || ''}" placeholder="العنوان">
                        <input id="e_length" class="input-dark" value="${customer.length || ''}" placeholder="الطول">
                        <input id="e_sleeve" class="input-dark" value="${customer.sleeve || ''}" placeholder="الكم">
                        <input id="e_seder" class="input-dark" value="${customer.seder || ''}" placeholder="السدر">
                        <input id="e_qubba" class="input-dark" value="${customer.qubba || ''}" placeholder="القبة">
                        <input id="e_tail" class="input-dark" value="${customer.tail || ''}" placeholder="الديل">
                        <input id="e_collar" class="input-dark" value="${customer.collar || ''}" placeholder="اللياقة">
                        <input id="e_sufra" class="input-dark" value="${customer.sufra || ''}" placeholder="السفرة">
                        <textarea id="e_notes" class="input-dark" placeholder="ملاحظات">${customer.notes || ''}</textarea>
                        <button class="btn-primary mt-2">تحديث البيانات</button>
                    </div>
                </form>
            `;
        }

        async function handleUpdateCustomer(e){
            e.preventDefault();
            const newName = document.getElementById("e_name").value.trim();
            const oldName = currentEditingName;

            const customer = {
                name: newName,
                phone: document.getElementById("e_phone").value,
                country: document.getElementById("e_country").value,
                length: document.getElementById("e_length").value,
                sleeve: document.getElementById("e_sleeve").value,
                seder: document.getElementById("e_seder").value,
                qubba: document.getElementById("e_qubba").value,
                tail: document.getElementById("e_tail").value,
                collar: document.getElementById("e_collar").value,
                sufra: document.getElementById("e_sufra").value,
                notes: document.getElementById("e_notes").value,
                updatedAt: new Date().toLocaleString("ar-EG")
            };

            if(oldName !== newName){
                await db.ref("customers/" + oldName).remove();
            }

            await db.ref("customers/" + newName).update(customer);
            showToast("تم التحديث بنجاح");
            closeDetails();
        }

        async function handleDeleteCustomer(name){
            if(!canDelete()){ showToast("ليس لديك صلاحية الحذف"); return; }
            if(!confirm("هل تريد حذف العميل؟")) return;
            
            await db.ref("customers/" + name).remove();
            closeDetails();
            showToast("تم الحذف بنجاح");
        }

        /* ===========================
           ADMIN DASHBOARD & CONTROLS
        =========================== */
        function openDashboard(){
            if(!canDashboard()){ showToast("ليس لديك صلاحية الإدارة"); return; }

            const totalCustomers = localData.length;
            const totalViews = localData.reduce((sum, c) => sum + (c.viewCount || 0), 0);
            const topCustomers = [...localData].sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0)).slice(0, 10);

            document.getElementById("detailsContent").innerHTML = `
                <h2 class="text-3xl font-black mb-6">لوحة التحكم</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-slate-800 p-5 rounded-2xl">
                        <p class="text-slate-400">إجمالي العملاء</p>
                        <h3 class="text-3xl font-black">${totalCustomers}</h3>
                    </div>
                    <div class="bg-slate-800 p-5 rounded-2xl">
                        <p class="text-slate-400">إجمالي المشاهدات</p>
                        <h3 class="text-3xl font-black">${totalViews}</h3>
                    </div>
                    <div class="bg-slate-800 p-5 rounded-2xl">
                        <p class="text-slate-400">المستخدم الحالي</p>
                        <h3 class="font-black text-lg text-indigo-400">${currentUser}</h3>
                    </div>
                </div>
                
                <h3 class="text-xl font-black mb-4">الأكثر تفاعلاً (Top 10)</h3>
                <div class="space-y-3 max-h-[30vh] overflow-y-auto mb-6 p-1">
                    ${topCustomers.map((c, index) => `
                        <div class="bg-slate-800 rounded-2xl p-4 flex justify-between">
                            <div>#${index + 1} &nbsp; ${c.name}</div>
                            <div class="text-indigo-400 font-bold">${c.viewCount || 0} مشاهدة</div>
                        </div>
                    `).join("")}
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleExportExcel()" class="bg-green-600 p-4 rounded-2xl font-black">تصدير Excel</button>
                    <button onclick="backupJSON()" class="bg-blue-600 p-4 rounded-2xl font-black">نسخة JSON</button>
                    <button onclick="handleOpenImport()" class="bg-purple-600 p-4 rounded-2xl font-black">استيراد Excel</button>
                    <button onclick="showLogs()" class="bg-orange-600 p-4 rounded-2xl font-black">سجل العمليات</button>
                </div>
                <input type="file" id="excelInput" accept=".xlsx,.xls" class="hidden" onchange="importExcel(event)">
            `;
            document.getElementById("detailsModal").classList.remove("hidden");
        }

        async function addLog(message){
            await db.ref("logs").push({
                user: currentUser,
                message: message,
                time: new Date().toLocaleString("ar-EG")
            });
        }

        async function showLogs(){
            const snap = await db.ref("logs").limitToLast(100).once("value");
            const logs = Object.values(snap.val() || {}).reverse();

            document.getElementById("detailsContent").innerHTML = `
                <h2 class="text-2xl font-black mb-6">سجل العمليات</h2>
                <div class="space-y-3 max-h-[60vh] overflow-y-auto p-1">
                    ${logs.map(log => `
                        <div class="bg-slate-800 p-4 rounded-2xl">
                            <div class="font-black text-indigo-400">${log.user}</div>
                            <div class="text-sm mt-1">${log.message}</div>
                            <div class="text-xs text-slate-500 mt-2">${log.time}</div>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function handleExportExcel(){
            if(!canExport()){ showToast("ليس لديك صلاحية التصدير"); return; }
            const ws = XLSX.utils.json_to_sheet(localData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Customers");
            XLSX.writeFile(wb, "Customers.xlsx");
            addLog("تصدير ملف Excel");
            showToast("تم التصدير بنجاح");
        }

        function handleOpenImport(){
            if(!canImport()){ showToast("ليس لديك صلاحية الاستيراد"); return; }
            document.getElementById("excelInput").click();
        }

        function importExcel(event){
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: "array" });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);
                
                for(const customer of json){
                    if(customer.name){
                        await db.ref("customers/" + customer.name).update(customer);
                    }
                }
                addLog("استيراد ملف Excel");
                showToast("تم الاستيراد بنجاح");
            };
            reader.readAsArrayBuffer(file);
        }

        function backupJSON(){
            const blob = new Blob([JSON.stringify(localData, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "backup.json";
            a.click();
            addLog("إنشاء نسخة احتياطية JSON");
            showToast("تم إنشاء النسخة الاحتياطية");
        }

        /* ===========================
           FIXED & ENHANCED SAVE IMAGE
        =========================== */
        function saveCardImage(customerName){
            const target = document.querySelector("#captureArea");
            const options = {
                backgroundColor: "#111827",
                scale: 2,
                useCORS: true,
                logging: false
            };

            html2canvas(target, options).then(canvas => {
                const link = document.createElement("a");
                link.download = `مقاسات_${customerName}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                addLog(`حفظ كارت مقاسات العميل: ${customerName}`);
                showToast("تم حفظ كارت الصورة بنجاح");
            }).catch(err => {
                console.error("حدث خطأ أثناء حفظ الصورة:", err);
                showToast("عذراً، فشل تصدير الصورة");
            });
        }

        /* ===========================
           ROLES & PERMISSIONS
        =========================== */
        function canDelete() { return currentUser.includes("إيهاب"); }
        function canImport() { return currentUser.includes("إيهاب") || currentUser.includes("إينال"); }
        function canExport() { return isAdmin; }
        function canDashboard() { return isAdmin; }

        /* ===========================
           INTERNET STATUS INDICATOR
        =========================== */
        function updateConnectionStatus(){
            const indicator = document.getElementById("internetIndicator");
            if(!indicator) return;
            
            if(navigator.onLine){
                indicator.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)] transition-all duration-300";
                indicator.setAttribute("title", "متصل بالإنترنت");
            } else {
                indicator.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.6)] transition-all duration-300 animate-pulse";
                indicator.setAttribute("title", "العمل بدون اتصال");
            }
        }
        window.addEventListener("online", updateConnectionStatus);
        window.addEventListener("offline", updateConnectionStatus);
        
        // تشغيل الفحص أول مرة بعد التحميل مباشرة
        setTimeout(updateConnectionStatus, 500);

        /* ===========================
           LOCAL STORAGE CACHE
        =========================== */
        function saveCache(){
            localStorage.setItem("E2_CUSTOMERS_CACHE", JSON.stringify(localData));
        }

        function loadCache(){
            const cache = localStorage.getItem("E2_CUSTOMERS_CACHE");
            if(!cache) return;
            try {
                localData = JSON.parse(cache);
                renderCustomers(localData);
                showToast("تم تحميل البيانات المحلية");
            } catch(err) {
                console.error("Cache load error:", err);
            }
        }

        window.addEventListener("load", () => {
            loadCache();
        });

        /* ===========================
           DYNAMIC NAVIGATION BUTTONS
        =========================== */
        function setupFloatingButtons(){
            const container = document.createElement("div");
            container.className = "fixed bottom-6 left-6 right-6 flex justify-between items-center pointer-events-none z-40";
            
            const rightGroup = document.createElement("div");
            rightGroup.className = "flex gap-3 pointer-events-auto";
            
            const dashboardBtn = document.createElement("button");
            dashboardBtn.className = "bg-indigo-700 w-14 h-14 rounded-2xl text-2xl shadow-2xl flex items-center justify-center hover:scale-105 transition";
            dashboardBtn.innerHTML = "📊";
            dashboardBtn.onclick = openDashboard;
            
            const logoutBtn = document.createElement("button");
            logoutBtn.className = "bg-red-600 px-4 h-14 rounded-2xl font-black shadow-2xl flex items-center justify-center hover:scale-105 transition text-sm text-white";
            logoutBtn.innerHTML = "تسجيل الخروج";
            logoutBtn.onclick = logout;
            
            rightGroup.appendChild(dashboardBtn);
            rightGroup.appendChild(logoutBtn);
            
            const addCustomerBtn = document.createElement("button");
            addCustomerBtn.className = "w-14 h-14 rounded-2xl bg-indigo-600 text-white text-3xl font-black shadow-2xl pointer-events-auto flex items-center justify-center hover:scale-105 transition";
            addCustomerBtn.innerHTML = "+";
            addCustomerBtn.onclick = openAddForm;
            
            container.appendChild(addCustomerBtn);
            container.appendChild(rightGroup);
            document.body.appendChild(container);
        }

        setTimeout(setupFloatingButtons, 1000);

        /* ===========================
           LOGOUT FUNCTION
        =========================== */
        function logout(){
            if(!confirm("هل متأكد من تسجيل الخروج؟")) return;
            currentUser = "";
            isAdmin = false;
            
            document.getElementById("app").classList.add("hidden");
            document.getElementById("loginPage").classList.remove("hidden");
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            showToast("تم تسجيل الخروج");
        }

        /* LOGIN INTERCEPTOR FOR LOGS */
        const originalHandleLogin = handleLogin;
        handleLogin = function(){
            originalHandleLogin();
            setTimeout(() => {
                if(currentUser) { addLog("تسجيل دخول إلى النظام"); }
            }, 1000);
        };

        console.log("%c E2 SMART SYSTEM 2026 ", "font-size:22px;font-weight:bold;color:#4f46e5;background:#1e1b4b;padding:4px;border-radius:8px;");
    </script>
</body>
</html>
